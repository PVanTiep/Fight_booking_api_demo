name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches: ["main"]
    types: [completed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only deploy when CI passes on main
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Trigger Render deploy
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK secret is not set — skipping deploy."
            echo "Add it via: GitHub repo → Settings → Secrets → Actions → New secret"
            echo "Get the URL from: Render dashboard → your service → Settings → Deploy Hook"
            exit 0
          fi
          curl -f -X POST "$DEPLOY_HOOK"
          echo "Deploy triggered on Render."
